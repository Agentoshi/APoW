[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false

[rpc_endpoints]
base = "${BASE_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
